<div class="chapter9">
    <h2>Forms</h2>
    <p>HTML forms are used to collect user input. They can include various types of input fields, such as text boxes, radio buttons, checkboxes, and dropdown lists. Forms also support validation to ensure that the data entered by the user meets certain criteria before it is submitted.</p>

<form action="#">
    <label for="firstName">First Name:</label>
    <input type="text" autofocus required id="firstName" placeholder="First Name"><br />
    <label for="lastName">Last Name:</label>
    <input type="text" required id="lastName" placeholder="Last Name"><br />
    <label for="email">Email <Address></Address>:</label>
    <input type="email" required id="email" placeholder="Email Address"><br />
    <label for="homePhone">Home Phone:</label>
    <input type="tel" id="homePhone" placeholder="Home Phone" pattern="^\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}$"><br />    
    <label for="workPhone">Work Phone:</label>
    <input type="tel" id="workPhone" placeholder="Work Phone" pattern="^\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}$"><br />
    <label for="url">URL:</label>
    <input type="url" id="url" placeholder="URL"><br />
    <label for="address1">Address:</label>
    <input type="text" id="address1" placeholder="Address (line 1)"><br />
    <label for="address2">Address (line 2):</label>
    <input type="text" id="address2" placeholder="Address (line 2)"><br />  
    <label for="city">City:</label>
    <input type="text" id="city" placeholder="City"><br />
    <label for="state">State:</label>
    <select id="state">
        <option value="AL">Alabama</option>
        <option value="AK">Alaska</option>
        <option value="AZ">Arizona</option>
        <!-- Add more states as needed -->
    </select><br />
    <label for="zip">Zip Code:</label>
    <input type="number" id="zip" placeholder="Zip Code" pattern="^\d{5}(-\d{4})?$"><br />
    <label for="country">Country:</label>
    <select id="country">
        <option value="US">United States</option>
        <option value="CA">Canada</option>
        <option value="MX">Mexico</option>
        <!-- Add more countries as needed -->
    </select><br />
    <input type="submit" value="Contact">

</form>
</div>
